<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The American Agency</title>

  <!-- Favicon -->
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/favicon-32x32.png" sizes="32x32" type="image/png">
  <link rel="icon" href="/favicon-16x16.png" sizes="16x16" type="image/png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="The American Agency is Here in NL.">
  <meta property="og:description" content="Unlock American processes for your company.">
  <meta property="og:image" content="/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="The American Agency is Here in NL.">
  <meta name="twitter:description" content="Unlock American processes for your company.">
  <meta name="twitter:image" content="/og-image.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --white: #fafaf8;
      --dark: #1a1a1a;
      --blue: #002868;
      --red: #BF0A30;
      --gold: #c9a84c;
      --gray: #6b6b6b;
    }

    html, body {
      width: 100svw;
      height: 100svh;
      overflow: hidden;
      font-family: 'Instrument Serif', serif;
      background: var(--white);
      color: var(--dark);
    }

    .page {
      width: 100svw;
      height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    /* Top bar */
    .top-bar {
      width: 100%;
      padding: 10px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #f0f0ec;
      font-size: 13px;
      color: var(--gray);
      letter-spacing: 0.01em;
      position: relative;
      z-index: 10;
      font-style: italic;
    }

    .top-bar .flag-icon {
      width: 18px;
      height: 12px;
      display: inline-flex;
      flex-direction: column;
      border-radius: 1px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .top-bar .flag-icon .stripe-r { background: var(--red); flex: 1; }
    .top-bar .flag-icon .stripe-w { background: #fff; flex: 1; }
    .top-bar .flag-icon .stripe-b { background: var(--blue); flex: 1; }

    .apply-btn {
      position: absolute;
      right: 24px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--blue);
      color: #fff;
      border: none;
      padding: 8px 22px;
      font-family: 'Instrument Serif', serif;
      font-size: 14px;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.25s;
    }

    .apply-btn:hover {
      background: var(--red);
    }

    /* Seals row */
    .seals {
      display: flex;
      gap: 28px;
      margin-top: 48px;
      align-items: center;
      opacity: 0;
      animation: fadeIn 0.8s ease 0.3s forwards;
    }

    .seal {
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .seal.side {
      width: 52px;
      height: 52px;
    }

    .seal.side svg {
      width: 52px;
      height: 52px;
    }

    .seal.center {
      width: 80px;
      height: 80px;
    }

    .seal.center svg {
      width: 80px;
      height: 80px;
    }

    /* Heading */
    .hero-heading {
      text-align: center;
      margin-top: 36px;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.5s forwards;
    }

    .hero-heading h1 {
      font-family: 'Instrument Serif', serif;
      font-weight: 400;
      font-size: clamp(42px, 6.5vw, 80px);
      line-height: 1.08;
      letter-spacing: -0.02em;
      color: var(--dark);
    }

    .hero-heading h1 .nl {
      color: var(--red);
    }

    /* Subtitle */
    .subtitle {
      text-align: center;
      margin-top: 18px;
      font-size: clamp(16px, 2vw, 20px);
      color: var(--gray);
      letter-spacing: 0.01em;
      opacity: 0;
      animation: fadeIn 0.8s ease 0.9s forwards;
    }

    /* Flag container */
    .flag-container {
      margin-top: auto;
      margin-bottom: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      position: relative;
      height: 45%;
      min-height: 240px;
      opacity: 0;
      animation: flagReveal 1.2s ease 1.1s forwards;
    }

    /* Flag with waving effect */
    .flag-wrapper {
      position: relative;
      width: clamp(320px, 55vw, 600px);
      perspective: 800px;
    }

    .flag {
      width: 100%;
      aspect-ratio: 1.9 / 1;
      position: relative;
      transform-origin: left center;
      animation: wave 4s ease-in-out infinite;
      filter: drop-shadow(0 20px 60px rgba(0,0,0,0.18));
    }

    .flag-surface {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
      border-radius: 2px;
    }

    /* American flag stripes */
    .stripes {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
    }

    .stripe {
      flex: 1;
    }

    .stripe:nth-child(odd) { background: var(--red); }
    .stripe:nth-child(even) { background: #fff; }

    /* Canton (blue field) */
    .canton {
      position: absolute;
      top: 0;
      left: 0;
      width: 40%;
      height: calc(100% / 13 * 7);
      background: var(--blue);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      padding: 4%;
      gap: 1px;
    }

    .star {
      color: #fff;
      font-size: clamp(5px, 1.1vw, 10px);
      line-height: 1;
      width: 10%;
      text-align: center;
    }

    /* Waving animation layers */
    .wave-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(
        90deg,
        rgba(0,0,0,0.06) 0%,
        rgba(255,255,255,0.12) 15%,
        rgba(0,0,0,0.04) 30%,
        rgba(255,255,255,0.1) 45%,
        rgba(0,0,0,0.06) 60%,
        rgba(255,255,255,0.08) 75%,
        rgba(0,0,0,0.04) 90%,
        rgba(255,255,255,0.06) 100%
      );
      animation: shimmer 3s ease-in-out infinite;
    }

    .wave-shadow {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(
        110deg,
        transparent 0%,
        rgba(0,0,0,0.03) 20%,
        transparent 40%,
        rgba(0,0,0,0.05) 60%,
        transparent 80%
      );
      animation: shimmer2 4s ease-in-out infinite reverse;
    }

    /* Pole */
    .pole {
      position: absolute;
      left: -8px;
      top: -30px;
      bottom: -20px;
      width: 6px;
      background: linear-gradient(90deg, #b8b8b8, #e0e0e0, #c0c0c0);
      border-radius: 3px;
      z-index: 2;
    }

    .pole-cap {
      position: absolute;
      left: -11px;
      top: -42px;
      width: 12px;
      height: 16px;
      background: linear-gradient(180deg, var(--gold), #a8842e);
      border-radius: 50% 50% 30% 30%;
      z-index: 3;
    }

    /* Cloth folds */
    .fold {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .fold::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        90deg,
        transparent,
        transparent 12%,
        rgba(0,0,0,0.02) 13%,
        transparent 14%,
        transparent 24%,
        rgba(255,255,255,0.04) 25%,
        transparent 26%
      );
      animation: foldMove 5s ease-in-out infinite;
    }

    /* Bottom gradient fade */
    .bottom-fade {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: linear-gradient(to top, var(--white), transparent);
      z-index: 5;
      pointer-events: none;
    }

    /* Animations */
    @keyframes wave {
      0%, 100% {
        transform: rotateY(0deg) skewY(0deg) scaleX(1);
      }
      25% {
        transform: rotateY(3deg) skewY(-0.8deg) scaleX(0.99);
      }
      50% {
        transform: rotateY(-2deg) skewY(0.5deg) scaleX(1.005);
      }
      75% {
        transform: rotateY(2deg) skewY(-0.4deg) scaleX(0.995);
      }
    }

    @keyframes shimmer {
      0%, 100% { transform: translateX(-5%); }
      50% { transform: translateX(5%); }
    }

    @keyframes shimmer2 {
      0%, 100% { transform: translateX(3%); opacity: 0.8; }
      50% { transform: translateX(-6%); opacity: 1; }
    }

    @keyframes foldMove {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(8px); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes flagReveal {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Ripple on flag body */
    .flag-ripple {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .flag-ripple::before,
    .flag-ripple::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      width: 200%;
      background: repeating-linear-gradient(
        90deg,
        transparent 0px,
        rgba(0,0,0,0.015) 30px,
        transparent 60px,
        rgba(255,255,255,0.03) 90px,
        transparent 120px
      );
    }

    .flag-ripple::before {
      animation: ripple1 3.5s ease-in-out infinite;
    }

    .flag-ripple::after {
      animation: ripple2 4.2s ease-in-out infinite;
      opacity: 0.7;
    }

    @keyframes ripple1 {
      0%, 100% { transform: translateX(-10%); }
      50% { transform: translateX(0%); }
    }

    @keyframes ripple2 {
      0%, 100% { transform: translateX(0%); }
      50% { transform: translateX(-8%); }
    }

    /* Subtle cloth deformation */
    .cloth-deform {
      position: absolute;
      inset: 0;
      pointer-events: none;
      animation: clothWave 6s ease-in-out infinite;
    }

    @keyframes clothWave {
      0%, 100% {
        clip-path: polygon(
          0% 0%, 20% 0.5%, 40% 0%, 60% 0.8%, 80% 0%, 100% 0.3%,
          100% 100%, 80% 99.5%, 60% 100%, 40% 99.2%, 20% 100%, 0% 99.7%
        );
      }
      33% {
        clip-path: polygon(
          0% 0.3%, 20% 0%, 40% 0.6%, 60% 0%, 80% 0.4%, 100% 0%,
          100% 99.7%, 80% 100%, 60% 99.4%, 40% 100%, 20% 99.6%, 0% 100%
        );
      }
      66% {
        clip-path: polygon(
          0% 0%, 20% 0.4%, 40% 0%, 60% 0.3%, 80% 0.7%, 100% 0%,
          100% 100%, 80% 99.6%, 60% 100%, 40% 99.7%, 20% 99.3%, 0% 100%
        );
      }
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--white);
      width: 90%;
      max-width: 420px;
      padding: 40px 36px;
      position: relative;
      transform: translateY(20px) scale(0.97);
      transition: transform 0.3s ease;
    }

    .modal-overlay.active .modal {
      transform: translateY(0) scale(1);
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 20px;
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: var(--gray);
      font-family: 'Instrument Serif', serif;
      transition: color 0.2s;
    }

    .modal-close:hover {
      color: var(--dark);
    }

    .modal h2 {
      font-family: 'Instrument Serif', serif;
      font-weight: 400;
      font-size: 28px;
      margin-bottom: 6px;
      color: var(--dark);
    }

    .modal p {
      font-size: 14px;
      color: var(--gray);
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      color: var(--dark);
      margin-bottom: 6px;
      letter-spacing: 0.02em;
    }

    .form-group input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #d0d0cc;
      background: #fff;
      font-family: 'Instrument Serif', serif;
      font-size: 15px;
      color: var(--dark);
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: var(--blue);
    }

    .form-group input::placeholder {
      color: #b0b0a8;
    }

    .submit-btn {
      width: 100%;
      padding: 12px;
      background: var(--blue);
      color: #fff;
      border: none;
      font-family: 'Instrument Serif', serif;
      font-size: 16px;
      cursor: pointer;
      letter-spacing: 0.02em;
      margin-top: 8px;
      transition: background 0.25s;
    }

    .submit-btn:hover {
      background: var(--red);
    }

    @media (max-width: 600px) {
      .flag-container {
        margin-top: auto;
        margin-bottom: auto;
        height: auto;
        min-height: unset;
        align-items: center;
      }

      .bottom-fade {
        display: none;
      }
    }

  </style>
</head>
<body>
  <div class="page">

    <div class="top-bar">
      <span class="flag-icon">
        <span class="stripe-r"></span>
        <span class="stripe-w"></span>
        <span class="stripe-b"></span>
      </span>
      An official entity of The American Agency
      <button class="apply-btn">Apply Now</button>
    </div>

    <div class="seals">
      <!-- Left seal - Department style, blue -->
      <div class="seal side">
        <svg viewBox="0 0 100 100" fill="none">
          <circle cx="50" cy="50" r="47" stroke="#1a3a6b" stroke-width="2" fill="none"/>
          <circle cx="50" cy="50" r="42" stroke="#1a3a6b" stroke-width="1" fill="none"/>
          <circle cx="50" cy="50" r="38" stroke="#1a3a6b" stroke-width="0.5" fill="none"/>
          <circle cx="50" cy="50" r="30" stroke="#1a3a6b" stroke-width="0.8" fill="#1a3a6b" fill-opacity="0.06"/>
          <!-- Inner shield -->
          <path d="M42 38 L50 34 L58 38 L58 52 L50 58 L42 52 Z" stroke="#1a3a6b" stroke-width="1.2" fill="#1a3a6b" fill-opacity="0.12"/>
          <line x1="50" y1="34" x2="50" y2="58" stroke="#1a3a6b" stroke-width="0.6"/>
          <line x1="42" y1="45" x2="58" y2="45" stroke="#1a3a6b" stroke-width="0.6"/>
          <!-- Stars around -->
          <text x="50" y="32" text-anchor="middle" font-size="4" fill="#1a3a6b">★ ★ ★</text>
          <!-- Circular text -->
          <defs><path id="topArcL" d="M15,50 a35,35 0 0,1 70,0"/></defs>
          <text font-size="5.5" fill="#1a3a6b" font-family="serif" letter-spacing="2.5">
            <textPath href="#topArcL" startOffset="50%" text-anchor="middle">DEPARTMENT OF STATE</textPath>
          </text>
          <defs><path id="botArcL" d="M17,54 a34,34 0 0,0 66,0"/></defs>
          <text font-size="5" fill="#1a3a6b" font-family="serif" letter-spacing="2">
            <textPath href="#botArcL" startOffset="50%" text-anchor="middle">UNITED STATES</textPath>
          </text>
        </svg>
      </div>

      <!-- Center seal - Presidential style, gold -->
      <div class="seal center">
        <svg viewBox="0 0 100 100" fill="none">
          <defs>
            <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#d4a843"/>
              <stop offset="30%" stop-color="#c49a38"/>
              <stop offset="50%" stop-color="#e0c068"/>
              <stop offset="70%" stop-color="#c49a38"/>
              <stop offset="100%" stop-color="#a8822a"/>
            </linearGradient>
          </defs>
          <!-- Outer ring -->
          <circle cx="50" cy="50" r="47" stroke="url(#goldGrad)" stroke-width="2.5" fill="none"/>
          <circle cx="50" cy="50" r="43" stroke="url(#goldGrad)" stroke-width="1" fill="none"/>
          <!-- Scalloped edge ticks -->
          <g stroke="url(#goldGrad)" stroke-width="0.8">
            <line x1="50" y1="3" x2="50" y2="7"/><line x1="58" y1="3.5" x2="57" y2="7.4"/>
            <line x1="66" y1="5.5" x2="64" y2="9.2"/><line x1="73" y1="9" x2="70" y2="12.2"/>
            <line x1="79" y1="14" x2="76" y2="16.8"/><line x1="84" y1="20" x2="80" y2="22.2"/>
            <line x1="87" y1="27" x2="83" y2="28.5"/><line x1="89" y1="34" x2="85" y2="35"/>
            <line x1="90" y1="42" x2="86" y2="42"/><line x1="90" y1="50" x2="86" y2="50"/>
            <line x1="90" y1="58" x2="86" y2="58"/><line x1="89" y1="66" x2="85" y2="65"/>
            <line x1="87" y1="73" x2="83" y2="71.5"/><line x1="84" y1="80" x2="80" y2="77.8"/>
            <line x1="79" y1="86" x2="76" y2="83.2"/><line x1="73" y1="91" x2="70" y2="87.8"/>
            <line x1="66" y1="94.5" x2="64" y2="90.8"/><line x1="58" y1="96.5" x2="57" y2="92.6"/>
            <line x1="50" y1="97" x2="50" y2="93"/><line x1="42" y1="96.5" x2="43" y2="92.6"/>
            <line x1="34" y1="94.5" x2="36" y2="90.8"/><line x1="27" y1="91" x2="30" y2="87.8"/>
            <line x1="21" y1="86" x2="24" y2="83.2"/><line x1="16" y1="80" x2="20" y2="77.8"/>
            <line x1="13" y1="73" x2="17" y2="71.5"/><line x1="11" y1="66" x2="15" y2="65"/>
            <line x1="10" y1="58" x2="14" y2="58"/><line x1="10" y1="50" x2="14" y2="50"/>
            <line x1="10" y1="42" x2="14" y2="42"/><line x1="11" y1="34" x2="15" y2="35"/>
            <line x1="13" y1="27" x2="17" y2="28.5"/><line x1="16" y1="20" x2="20" y2="22.2"/>
            <line x1="21" y1="14" x2="24" y2="16.8"/><line x1="27" y1="9" x2="30" y2="12.2"/>
            <line x1="34" y1="5.5" x2="36" y2="9.2"/><line x1="42" y1="3.5" x2="43" y2="7.4"/>
          </g>
          <circle cx="50" cy="50" r="36" stroke="url(#goldGrad)" stroke-width="0.8" fill="none"/>
          <!-- Eagle body -->
          <path d="M50 38 L47 44 L40 44 L38 48 L42 50 L39 54 L43 55 L46 52 L50 56 L54 52 L57 55 L61 54 L58 50 L62 48 L60 44 L53 44 Z" fill="url(#goldGrad)" fill-opacity="0.7" stroke="url(#goldGrad)" stroke-width="0.6"/>
          <!-- Eagle head -->
          <circle cx="50" cy="37" r="2.5" fill="url(#goldGrad)" fill-opacity="0.8"/>
          <!-- Wings spread -->
          <path d="M40 44 L32 40 L30 42 L36 46" stroke="url(#goldGrad)" stroke-width="0.8" fill="url(#goldGrad)" fill-opacity="0.3"/>
          <path d="M60 44 L68 40 L70 42 L64 46" stroke="url(#goldGrad)" stroke-width="0.8" fill="url(#goldGrad)" fill-opacity="0.3"/>
          <!-- Shield on eagle -->
          <rect x="47" y="42" width="6" height="8" rx="0.5" stroke="url(#goldGrad)" stroke-width="0.5" fill="url(#goldGrad)" fill-opacity="0.15"/>
          <line x1="49" y1="42" x2="49" y2="50" stroke="url(#goldGrad)" stroke-width="0.3"/>
          <line x1="51" y1="42" x2="51" y2="50" stroke="url(#goldGrad)" stroke-width="0.3"/>
          <!-- Stars arc above eagle -->
          <text x="50" y="31" text-anchor="middle" font-size="3.5" fill="url(#goldGrad)" letter-spacing="1">★ ★ ★ ★ ★</text>
          <!-- Circular text -->
          <defs><path id="topArcC" d="M12,50 a38,38 0 0,1 76,0"/></defs>
          <text font-size="5.8" fill="url(#goldGrad)" font-family="serif" letter-spacing="3" font-weight="600">
            <textPath href="#topArcC" startOffset="50%" text-anchor="middle">SEAL OF THE PRESIDENT</textPath>
          </text>
          <defs><path id="botArcC" d="M14,54 a37,37 0 0,0 72,0"/></defs>
          <text font-size="5.2" fill="url(#goldGrad)" font-family="serif" letter-spacing="2.5">
            <textPath href="#botArcC" startOffset="50%" text-anchor="middle">OF THE UNITED STATES</textPath>
          </text>
          <!-- Dots between text -->
          <circle cx="13" cy="50" r="1.2" fill="url(#goldGrad)"/>
          <circle cx="87" cy="50" r="1.2" fill="url(#goldGrad)"/>
        </svg>
      </div>

      <!-- Right seal - DHS style, blue -->
      <div class="seal side">

    modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });
    document.getElementById('applyForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(e.target));
      console.log('Application:', data);
      e.target.innerHTML = '<p style="text-align:center;font-size:18px;color:#1a1a1a;padding:20px 0;">Application received.<br>We\'ll be in touch.</p>';
